<nav class="navbar">

  <!-- LEFT -->
  <div class="nav-left">
    <h2 routerLink="/home" class="logo">Foodie</h2>

    <div class="nav-links desktop">
      <a routerLink="/home" routerLinkActive="active">Home</a>
      <a routerLink="/menu" routerLinkActive="active">Menu</a>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="nav-right desktop">
    <a routerLink="/cart" class="cart">🛒</a>
    <a routerLink="/login" class="login">Login</a>
    <a routerLink="/signup" class="signup">Sign Up</a>
  </div>

  <!-- BURGER -->
  <div class="menu-toggle" (click)="isOpen = !isOpen">☰</div>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" [class.show]="isOpen">
    <a routerLink="/home" (click)="closeMenu()">Home</a>
    <a routerLink="/menu" (click)="closeMenu()">Menu</a>
    <a routerLink="/cart">🛒 Cart</a>
    <a routerLink="/login">Login</a>
    <a routerLink="/signup" class="signup">Sign Up</a>
  </div>

</nav>
